name: Permit Status Scraper

on:
  # Manual trigger with optional dry-run flag
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (scrape + log, skip DB writes and emails)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

  # Scheduled runs — weekdays every 2 hours 6am–6pm ET, weekends 3x/day
  schedule:
    - cron: '0 6,8,10,12,14,16,18 * * 1-5'   # Mon–Fri 06:00–18:00 UTC
    - cron: '0 8,12,16 * * 0,6'               # Sat–Sun 08:00, 12:00, 16:00 UTC

jobs:
  scrape:
    name: Run permit scraper
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          clean: true

      - name: Debug - find TSX files
        run: |
          echo "=== TSX files found ==="
          find . -name "*.tsx" -not -path "*/node_modules/*" -not -path "*/.next/*"
          echo "=== emails folder check ==="
          ls -la emails 2>/dev/null || echo "emails/ folder NOT found - good"

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build scraper
        run: npm run build:scraper

      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps

      - name: Run scraper
        run: node dist/scraper/scrapers/index.js
        env:
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          FROM_EMAIL: ${{ secrets.FROM_EMAIL }}
          FROM_NAME: ${{ secrets.FROM_NAME }}
          ADMIN_EMAIL: ${{ secrets.ADMIN_EMAIL }}
          NEXT_PUBLIC_URL: ${{ secrets.NEXT_PUBLIC_URL }}

      - name: Log failure notice
        if: failure()
        run: |
          echo "::error::Scraper job failed. Check the logs above for details."
          echo "Tip: re-run with dry_run=true via workflow_dispatch to test without side effects."
