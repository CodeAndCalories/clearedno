name: Outreach Email Sender

on:
  schedule:
    - cron: '0 14 * * 1-5'   # Mon-Fri 9:00am EST (UTC-5 → 14:00 UTC)
    - cron: '5 14 * * 1-5'   # Mon-Fri 9:05am EST
  workflow_dispatch:          # Allow manual trigger from GitHub Actions UI

jobs:
  outreach-send:
    if: github.event.schedule == '0 14 * * 1-5' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Send outreach emails
        run: |
          curl -v -X POST https://clearedno.com/api/outreach-send \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json" \
            --fail \
            --show-error

  outreach-followup:
    if: github.event.schedule == '5 14 * * 1-5' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Send follow-up emails
        run: |
          curl -v -X POST https://clearedno.com/api/outreach-followup \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json" \
            --fail \
            --show-error
