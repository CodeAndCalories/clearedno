name: Outreach Email Sender

on:
  schedule:
    - cron: '0 14 * * 1-5'   # Mon-Fri 9:00am EST (UTC-5 → 14:00 UTC)
    - cron: '5 14 * * 1-5'   # Mon-Fri 9:05am EST
  workflow_dispatch:          # Allow manual trigger from GitHub Actions UI

jobs:
  outreach-send:
    if: github.event.schedule == '0 14 * * 1-5' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Send outreach emails
        run: |
          curl -v -X POST "https://clearedno.com/api/outreach-send?secret=${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json" \
            -H "User-Agent: Mozilla/5.0 (compatible; ClearedNo-Cron/1.0)" \
            --fail \
            --show-error \
            --retry 3 \
            --retry-delay 5

  outreach-followup:
    if: github.event.schedule == '5 14 * * 1-5' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Send follow-up emails
        run: |
          curl -v -X POST "https://clearedno.com/api/outreach-followup?secret=${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json" \
            -H "User-Agent: Mozilla/5.0 (compatible; ClearedNo-Cron/1.0)" \
            --fail \
            --show-error \
            --retry 3 \
            --retry-delay 5
