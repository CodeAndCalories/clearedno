name: Outreach Email Sender

# Sends cold outreach emails via Resend API.
#
# Required GitHub Secrets (Settings → Secrets and variables → Actions):
#
#   NEXT_PUBLIC_SUPABASE_URL  — Supabase Dashboard → Settings → API → Project URL
#   SUPABASE_SERVICE_ROLE_KEY — Supabase Dashboard → Settings → API → service_role key
#   RESEND_API_KEY            — Resend Dashboard → API Keys
#   FROM_EMAIL                — verified sender address in Resend
#   FROM_NAME                 — sender display name (e.g. "Alex at ClearedNo")

on:
  schedule:
    - cron: '0 14 * * 1-5'   # Mon-Fri 9:00am EST (UTC-5 → 14:00 UTC)
    - cron: '5 14 * * 1-5'   # Mon-Fri 9:05am EST
  workflow_dispatch:          # Allow manual trigger from GitHub Actions UI

jobs:
  outreach-send:
    if: github.event.schedule == '0 14 * * 1-5' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      NEXT_PUBLIC_SUPABASE_URL:  ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      RESEND_API_KEY:            ${{ secrets.RESEND_API_KEY }}
      FROM_EMAIL:                ${{ secrets.FROM_EMAIL }}
      FROM_NAME:                 ${{ secrets.FROM_NAME }}
    steps:
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install --no-save @supabase/supabase-js

      - name: Send outreach emails
        run: |
          node << 'SCRIPT'
          const { createClient } = require('@supabase/supabase-js');

          const supabase = createClient(
            process.env.NEXT_PUBLIC_SUPABASE_URL,
            process.env.SUPABASE_SERVICE_ROLE_KEY
          );

          const month = new Date().toLocaleString('en-US', { month: 'long' });

          function buildOutreachHtml(city, email) {
            const unsubUrl = 'https://clearedno.com/api/unsubscribe?email=' + encodeURIComponent(email);
            return [
              'Hi,',
              '',
              'I pull weekly storm damage leads for roofing contractors in ' + city + '. Figured I\'d reach out since you cover the area.',
              '',
              'Last month\'s storms hit ' + city + ' hard — I have a list of properties with owner names, addresses, and year built ready to download.',
              '',
              'Most contractors use it to canvass within 48 hours of a storm. One job covers the cost for the year.',
              '',
              'I pulled a free sample of 10 real properties from ' + city + ' — owner names, addresses, year built, storm severity. No signup needed:',
              '',
              '→ <a href="https://clearedno.com/api/sample-download">clearedno.com/api/sample-download</a>',
              '',
              'If it looks useful, full weekly access is $300/month. 30-day money back, no contracts.',
              '',
              '---',
              "You're receiving this email because your business was found via public business listings as a roofing contractor serving the Midwest.",
              '',
              'To unsubscribe: <a href="' + unsubUrl + '">' + unsubUrl + '</a>',
              '',
              'ClearedNo | 1179 W Miner Rd, Cleveland, OH 44109',
              'clearedno.com',
            ].join('<br>');
          }

          async function main() {
            const { data: leads, error } = await supabase
              .from('outreach_leads')
              .select('id, email, city, state')
              .or('outreach_sent.is.null,outreach_sent.eq.false')
              .or('unsubscribed.is.null,unsubscribed.eq.false')
              .not('email', 'is', null)
              .neq('state', 'TX')
              .limit(25);

            if (error) throw new Error(error.message);
            console.log('[outreach-send] Found ' + (leads ? leads.length : 0) + ' unsent leads');
            if (!leads || leads.length === 0) {
              console.log('[outreach-send] No unsent leads found');
              return;
            }

            const fromName  = process.env.FROM_NAME  || 'ClearedNo';
            let sent = 0;

            for (const lead of leads) {
              if (!lead.email) continue;

              const cleanEmail   = lead.email.replace(/[\\s]+$/g, '').trim();
              const city         = lead.city || 'your area';
              const emailSubject = 'Hail hit ' + city + ' — ' + month + ' property list';
              const emailBody    = buildOutreachHtml(city, lead.email);

              try {
                const res = await fetch('https://api.resend.com/emails', {
                  method: 'POST',
                  headers: {
                    'Authorization': `Bearer ${process.env.RESEND_API_KEY}`,
                    'Content-Type': 'application/json'
                  },
                  body: JSON.stringify({
                    from: fromName + ' <' + process.env.FROM_EMAIL + '>',
                    to: cleanEmail,
                    subject: emailSubject,
                    html: emailBody
                  })
                });

                if (!res.ok) {
                  const body = await res.text();
                  console.error('[outreach-send] Resend error for ' + lead.email + ':', res.status, body);
                  continue;
                }
              } catch (err) {
                console.error('[outreach-send] Failed to send to ' + lead.email + ':', err.message);
                continue;
              }

              await new Promise(resolve => setTimeout(resolve, 300));

              const { error: updateError } = await supabase
                .from('outreach_leads')
                .update({ outreach_sent: true, outreach_sent_at: new Date().toISOString() })
                .eq('id', lead.id);

              if (updateError) {
                console.error('[outreach-send] Failed to mark sent for ' + lead.id + ':', updateError.message);
              } else {
                console.log('[outreach-send] Sent to ' + lead.email + ' (' + city + ')');
                sent++;
              }

              await new Promise(r => setTimeout(r, 1200));
            }

            console.log('[outreach-send] Done — sent ' + sent + ' / ' + leads.length);
          }

          main().catch(err => {
            console.error('[outreach-send] Fatal:', err.message);
            process.exit(1);
          });
          SCRIPT

  outreach-followup:
    if: github.event.schedule == '5 14 * * 1-5' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      NEXT_PUBLIC_SUPABASE_URL:  ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      RESEND_API_KEY:            ${{ secrets.RESEND_API_KEY }}
      FROM_EMAIL:                ${{ secrets.FROM_EMAIL }}
      FROM_NAME:                 ${{ secrets.FROM_NAME }}
    steps:
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install --no-save @supabase/supabase-js

      - name: Send follow-up emails
        run: |
          node << 'SCRIPT'
          const { createClient } = require('@supabase/supabase-js');

          const supabase = createClient(
            process.env.NEXT_PUBLIC_SUPABASE_URL,
            process.env.SUPABASE_SERVICE_ROLE_KEY
          );

          function buildFollowupHtml(city, state, email) {
            const unsubUrl = 'https://clearedno.com/api/unsubscribe?email=' + encodeURIComponent(email);
            return [
              'Hi there,',
              '',
              'Just following up on the note I sent last week about storm damage leads in ' + city + ', ' + state + '.',
              '',
              "If you're hitting storm season and want to see which streets got hit and who owns the houses — happy to pull a specific county sample for you.",
              '',
              'Just reply and let me know which county.',
              '',
              'ClearedNo',
              '',
              '---',
              'To unsubscribe: <a href="' + unsubUrl + '">' + unsubUrl + '</a>',
              '',
              'ClearedNo | 1179 W Miner Rd, Cleveland, OH 44109',
              'clearedno.com',
            ].join('<br>');
          }

          async function main() {
            const fiveDaysAgo = new Date(Date.now() - 5 * 24 * 60 * 60 * 1000).toISOString();

            const { data: leads, error } = await supabase
              .from('outreach_leads')
              .select('id, email, city, state')
              .eq('outreach_sent', true)
              .or('outreach_followup_sent.is.null,outreach_followup_sent.eq.false')
              .or('unsubscribed.is.null,unsubscribed.eq.false')
              .not('email', 'is', null)
              .neq('state', 'TX')
              .lt('outreach_sent_at', fiveDaysAgo)
              .limit(25);

            if (error) throw new Error(error.message);
            console.log('[outreach-followup] Found ' + (leads ? leads.length : 0) + ' follow-up candidates');
            if (!leads || leads.length === 0) {
              console.log('[outreach-followup] No follow-up candidates found');
              return;
            }

            const fromName  = process.env.FROM_NAME  || 'ClearedNo';
            let sent = 0;

            for (const lead of leads) {
              if (!lead.email) continue;

              const cleanEmail   = lead.email.replace(/[\\s]+$/g, '').trim();
              const city         = lead.city  || 'your area';
              const state        = lead.state || '';
              const emailSubject = 'Re: ' + city + ' roofing leads — quick follow up';
              const emailBody    = buildFollowupHtml(city, state, lead.email);

              try {
                const res = await fetch('https://api.resend.com/emails', {
                  method: 'POST',
                  headers: {
                    'Authorization': `Bearer ${process.env.RESEND_API_KEY}`,
                    'Content-Type': 'application/json'
                  },
                  body: JSON.stringify({
                    from: fromName + ' <' + process.env.FROM_EMAIL + '>',
                    to: cleanEmail,
                    subject: emailSubject,
                    html: emailBody
                  })
                });

                if (!res.ok) {
                  const body = await res.text();
                  console.error('[outreach-followup] Resend error for ' + lead.email + ':', res.status, body);
                  continue;
                }
              } catch (err) {
                console.error('[outreach-followup] Failed to send to ' + lead.email + ':', err.message);
                continue;
              }

              await new Promise(resolve => setTimeout(resolve, 300));

              const { error: updateError } = await supabase
                .from('outreach_leads')
                .update({
                  outreach_followup_sent:    true,
                  outreach_followup_sent_at: new Date().toISOString(),
                })
                .eq('id', lead.id);

              if (updateError) {
                console.error('[outreach-followup] Failed to mark followup sent for ' + lead.id + ':', updateError.message);
              } else {
                console.log('[outreach-followup] Sent to ' + lead.email + ' (' + city + ', ' + state + ')');
                sent++;
              }

              await new Promise(r => setTimeout(r, 1200));
            }

            console.log('[outreach-followup] Done — sent ' + sent + ' / ' + leads.length);
          }

          main().catch(err => {
            console.error('[outreach-followup] Fatal:', err.message);
            process.exit(1);
          });
          SCRIPT
