name: Roofing Leads Weekly Digest

on:
  schedule:
    - cron: '0 13 * * 1'  # Every Monday at 8am EST (UTC-5 → 13:00 UTC)
  workflow_dispatch:       # Allow manual trigger from GitHub Actions UI

jobs:
  digest:
    runs-on: ubuntu-latest

    steps:
      - name: Send weekly digest email
        run: |
          curl -X POST https://clearedno.com/api/leads-digest \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json" \
            --fail \
            --silent \
            --show-error

      - name: Send county alert notifications
        run: |
          curl -X POST https://clearedno.com/api/leads-digest/notify-alerts \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json" \
            --fail \
            --silent \
            --show-error
