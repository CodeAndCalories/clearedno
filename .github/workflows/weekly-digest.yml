name: Weekly Permit Digest

on:
  # Every Tuesday at 14:00 UTC = 8:00 AM CST (UTC-6) / 9:00 AM CDT (UTC-5)
  # This covers both Central Standard and Central Daylight time for Texas contractors.
  schedule:
    - cron: '0 14 * * 2'

  # Allow manual trigger for testing
  workflow_dispatch:

jobs:
  send-digest:
    name: Send weekly digest emails
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Send weekly digest
        run: |
          response=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST "${{ secrets.NEXT_PUBLIC_URL }}/api/digest" \
            -H "Authorization: Bearer ${{ secrets.DIGEST_SECRET }}" \
            -H "Content-Type: application/json")

          echo "HTTP status: $response"

          if [ "$response" != "200" ]; then
            echo "::error::Digest API returned HTTP $response"
            exit 1
          fi

      - name: Log success
        run: echo "Weekly digest sent successfully."
